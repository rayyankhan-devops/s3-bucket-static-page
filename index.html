<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS S3 Static Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0078ff,#00c6ff);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            padding:50px;
            border-radius:15px;
            backdrop-filter:blur(10px);
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.2rem;
            margin-bottom:30px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:white;
            color:#0078ff;
            text-decoration:none;
            border-radius:30px;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#f2f2f2;
            transform:scale(1.05);
        }

        footer{
            margin-top:30px;
            font-size:14px;
            opacity:0.8;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🚀 AWS S3 Static Website</h1>

    <p>
        Congratulations! Your static website is successfully hosted on Amazon S3.
    </p>

    <a href="https://aws.amazon.com/s3/" class="btn" target="_blank">
        Learn About Amazon S3
    </a>

    <footer>
        Hosted using Amazon S3 Static Website Hosting
    </footer>
</div>

</body>
</html>
