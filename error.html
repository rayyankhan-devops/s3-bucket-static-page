<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#111827;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
        }

        h1{
            font-size:7rem;
            color:#ef4444;
        }

        h2{
            margin:20px 0;
            font-size:2rem;
        }

        p{
            color:#cbd5e1;
            margin-bottom:30px;
            font-size:18px;
        }

        a{
            display:inline-block;
            padding:12px 25px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:.3s;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
        The page you are looking for doesn't exist or has been moved.
    </p>

    <a href="index.html">Go Back Home</a>

</div>

</body>
</html>
